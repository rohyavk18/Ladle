<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mere Ladle - Full Crew</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: radial-gradient(circle, #1a0210 0%, #000 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            color: #fff;
        }
        canvas { position: absolute; z-index: 1; }
        .content { position: relative; z-index: 3; text-align: center; pointer-events: none; }
        
        h1 {
            font-size: 2.8rem;
            margin-bottom: 300px;
            background: linear-gradient(45deg, #ff2d55, #ffacbc, #ff2d55);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 25px rgba(255,45,85,0.4);
            letter-spacing: 2px;
        }

        .description-box { height: 120px; margin-top: 150px; }
        .name-tag { font-size: 2.2rem; color: #ffeb3b; font-weight: 800; display: block; text-shadow: 0 0 15px rgba(251, 192, 45, 0.6); }
        .desc-text { font-size: 1.3rem; color: #e1f5fe; font-style: italic; display: block; margin-top: 10px; }
        
        #music-btn {
            position: fixed;
            bottom: 30px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid #ff2d55;
            color: #ff2d55;
            padding: 12px 30px;
            border-radius: 50px;
            cursor: pointer;
            z-index: 100;
            font-weight: bold;
            backdrop-filter: blur(8px);
            transition: 0.3s;
        }
        #music-btn:hover { background: #ff2d55; color: #fff; transform: scale(1.1); }

        .fade { transition: all 0.7s ease-in-out; opacity: 0; transform: translateY(10px); }
        .visible { opacity: 1; transform: translateY(0); }
    </style>
</head>
<body>

<button id="music-btn">🎵 START SHEESHA SONG</button>

<audio id="bg-music" loop>
    <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-8.mp3" type="audio/mpeg">
</audio>

<div class="content">
    <h1>MERE LADLE</h1>
    <div id="info-box" class="description-box fade">
        <span id="name-display" class="name-tag"></span>
        <span id="desc-display" class="desc-text"></span>
    </div>
</div>

<canvas id="heartCanvas"></canvas>

<script>
    const canvas = document.getElementById('heartCanvas');
    const ctx = canvas.getContext('2d');
    const audio = document.getElementById('bg-music');
    const btn = document.getElementById('music-btn');

    btn.onclick = () => {
        if (audio.paused) { audio.play(); btn.innerText = "⏸ PAUSE"; }
        else { audio.pause(); btn.innerText = "▶ PLAY"; }
    };

    const profiles = [
        { name: "Guru", desc: "The Soulful Singer — Spreading magic through every note." },
        { name: "Sayali", desc: "The Sanskari One — Carrying grace and tradition in her heart." },
        { name: "Aditya", desc: "The Heavy Driver — Fast, fearless, and always in control." },
        { name: "Bhagyashree", desc: "The Chidchidi — Our favorite little ball of cranky energy!" },
        { name: "Priti", desc: "The Laughing Machine — Turning every moment into a joyful riot." },
        { name: "Pooja", desc: "The Pahadan — Strong and majestic, like the mountains she loves." },
        { name: "Sumit", desc: "The Blogger — Capturing life's best moments and telling our story." }
    ];

    let pIdx = 0;
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    let particles = [];
    let time = 0;

    function getHeartPoint(t) {
        return {
            x: 16 * Math.pow(Math.sin(t), 3),
            y: -(13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t)),
            z: Math.sin(t * 3) * 8
        };
    }

    class Particle {
        constructor(a) {
            const pt = getHeartPoint(a);
            this.x = pt.x; this.y = pt.y; this.z = pt.z;
            this.s = Math.random() * 2 + 1;
            this.c = `hsla(${340 + Math.random() * 40}, 100%, 75%, 0.85)`;
        }
        draw(p, r) {
            let rx = (this.x * p) * Math.cos(r) - (this.z * p) * Math.sin(r);
            let rz = (this.x * p) * Math.sin(r) + (this.z * p) * Math.cos(r);
            const pr = 650 / (650 + rz);
            ctx.fillStyle = this.c;
            ctx.beginPath();
            ctx.arc(canvas.width/2 + rx*pr, canvas.height/2 + (this.y*p)*pr, this.s*pr, 0, 7);
            ctx.fill();
        }
    }

    for(let i=0; i<1500; i++) particles.push(new Particle(Math.random()*Math.PI*2));

    function cycle() {
        const box = document.getElementById('info-box');
        box.classList.remove('visible');
        setTimeout(() => {
            document.getElementById('name-display').innerText = profiles[pIdx].name;
            document.getElementById('desc-display').innerText = profiles[pIdx].desc;
            box.classList.add('visible');
            pIdx = (pIdx + 1) % profiles.length;
        }, 700);
    }
    cycle(); setInterval(cycle, 4500);

    function animate() {
        ctx.fillStyle = 'rgba(0,0,0,0.18)';
        ctx.fillRect(0,0,canvas.width,canvas.height);
        const pulse = 13 + Math.sin(time * 2.8) * 5; 
        particles.forEach(p => p.draw(pulse, time * 0.7));
        time += 0.035;
        requestAnimationFrame(animate);
    }
    window.onresize = () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; };
    animate();
</script>
</body>
</html>
