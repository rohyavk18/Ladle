<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy International Women's Day</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #0b0214; /* Deep purple theme */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #fff;
        }
        canvas {
            display: block;
            position: absolute;
            z-index: 1;
        }
        .content {
            position: relative;
            z-index: 2;
            text-align: center;
            pointer-events: none;
            width: 80%;
        }
        h1 {
            font-size: 3rem;
            margin-bottom: 250px; /* Space for the heart in the middle */
            background: linear-gradient(90deg, #ff7eb3, #ff758c, #ad3981);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }
        .message-container {
            font-size: 1.5rem;
            font-weight: 300;
            height: 40px;
            opacity: 0;
            transition: opacity 1s ease-in-out;
            color: #f8bbd0;
            margin-top: 100px;
        }
        .visible {
            opacity: 1;
        }
    </style>
</head>
<body>

<div class="content">
    <h1>Happy International Women's Day</h1>
    <div id="message" class="message-container">Resilience & Strength</div>
</div>

<canvas id="heartCanvas"></canvas>

<script>
    const canvas = document.getElementById('heartCanvas');
    const ctx = canvas.getContext('2d');
    const msgElement = document.getElementById('message');

    const points = [
        "Resilience & Boundless Strength",
        "Leaders of Innovation & Change",
        "The Heart of Compassion & Empathy",
        "Breaking Barriers Every Day",
        "Wisdom that Inspires Generations"
    ];

    let msgIndex = 0;
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    let particles = [];
    const particleCount = 800;
    let time = 0;

    // Heart formula
    function getHeartPoint(t) {
        return {
            x: 16 * Math.pow(Math.sin(t), 3),
            y: -(13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t))
        };
    }

    class Particle {
        constructor(angle) {
            this.angle = angle;
            this.basePos = getHeartPoint(angle);
            this.size = Math.random() * 2.5 + 0.5;
            // Purple and Pink palette
            this.color = `rgba(${200 + Math.random() * 55}, ${100 + Math.random() * 100}, ${200 + Math.random() * 55}, 0.8)`;
            this.offset = Math.random() * Math.PI * 2;
        }

        draw(scale) {
            const drift = Math.sin(time + this.offset) * 1.5;
            const x = canvas.width / 2 + (this.basePos.x * scale) + drift;
            const y = canvas.height / 2 + (this.basePos.y * scale) + drift;

            ctx.fillStyle = this.color;
            ctx.shadowBlur = 10;
            ctx.shadowColor = this.color;
            ctx.beginPath();
            ctx.arc(x, y, this.size, 0, Math.PI * 2);
            ctx.fill();
        }
    }

    for (let i = 0; i < particleCount; i++) {
        const angle = Math.random() * Math.PI * 2;
        particles.push(new Particle(angle));
    }

    function rotateMessages() {
        msgElement.classList.remove('visible');
        setTimeout(() => {
            msgIndex = (msgIndex + 1) % points.length;
            msgElement.innerText = points[msgIndex];
            msgElement.classList.add('visible');
        }, 1000);
    }

    // Initial fade in
    setTimeout(() => msgElement.classList.add('visible'), 500);
    setInterval(rotateMessages, 4000);

    function animate() {
        ctx.fillStyle = 'rgba(11, 2, 20, 0.2)'; // Clear with trailing effect
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Pulse logic: Size flows between 9 and 15
        const pulseScale = 12 + Math.sin(time * 2.5) * 3;

        particles.forEach(p => p.draw(pulseScale));

        time += 0.04;
        requestAnimationFrame(animate);
    }

    window.addEventListener('resize', () => {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    });

    animate();
</script>
</body>
</html>
